<!DOCTYPE html>
<html>
<head>
    <title>AuraSpeed Web</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --accent: #00bcd4;
            --accent-hover: #0097a7;
            --success: #4caf50;
            --warning: #ff9800;
            --error: #f44336;
            --border: #e0e0e0;
            --shadow: rgba(0,0,0,0.1);
        }

        .dark-theme {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #00bcd4;
            --border: #2a2a4a;
            --shadow: rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent), #673ab7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: var(--accent);
            color: white;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        #status {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        #status.loading { display: block; background: var(--warning); color: white; }
        #status.success { display: block; background: var(--success); color: white; }
        #status.error { display: block; background: var(--error); color: white; }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: var(--bg-secondary);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px var(--shadow);
            border: 1px solid var(--border);
        }

        .metric-card h3 {
            margin: 0 0 10px 0;
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-card .value {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent);
        }

        .metric-card .unit {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .info-card {
            background: var(--bg-secondary);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .info-card h2 { margin-top: 0; color: var(--text-primary); }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-item label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .info-item span {
            font-size: 16px;
            color: var(--text-primary);
        }

        .history-section {
            background: var(--bg-secondary);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow);
            border: 1px solid var(--border);
        }

        .history-section h2 {
            margin-top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: var(--error);
        }

        #history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:last-child { border-bottom: none; }

        .history-time { color: var(--text-secondary); font-size: 14px; }
        .history-stats { display: flex; gap: 20px; font-size: 14px; }
        .history-stat span { color: var(--accent); font-weight: bold; }

        .no-data {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AuraSpeed</h1>
            <button class="theme-toggle" onclick="toggleTheme()">Dark Mode</button>
        </header>

        <div class="actions">
            <button onclick="runSpeedTest()">Run Speed Test</button>
            <button class="secondary" onclick="getSystemInfo()">System Info</button>
        </div>

        <div id="status"></div>

        <div id="results" style="display: none;">
            <div class="results-grid">
                <div class="metric-card">
                    <h3>Download</h3>
                    <div class="value" id="download">--</div>
                    <div class="unit">Mbps</div>
                </div>
                <div class="metric-card">
                    <h3>Upload</h3>
                    <div class="value" id="upload">--</div>
                    <div class="unit">Mbps</div>
                </div>
                <div class="metric-card">
                    <h3>Latency</h3>
                    <div class="value" id="ping">--</div>
                    <div class="unit">ms</div>
                </div>
            </div>

            <div class="info-card">
                <h2>Connection Details</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <label>ISP</label>
                        <span id="isp">--</span>
                    </div>
                    <div class="info-item">
                        <label>Server</label>
                        <span id="server">--</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="sysinfo" style="display: none;">
            <div class="info-card">
                <h2>System Information</h2>
                <div class="info-grid">
                    <div class="info-item">
                        <label>Operating System</label>
                        <span id="info-os">--</span>
                    </div>
                    <div class="info-item">
                        <label>CPU</label>
                        <span id="info-cpu">--</span>
                    </div>
                    <div class="info-item">
                        <label>Memory</label>
                        <span id="info-memory">--</span>
                    </div>
                    <div class="info-item">
                        <label>Disk</label>
                        <span id="info-disk">--</span>
                    </div>
                    <div class="info-item">
                        <label>Hostname</label>
                        <span id="info-hostname">--</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="history-section">
            <h2>
                Test History
                <button class="clear-btn" onclick="clearHistory()">Clear</button>
            </h2>
            <div id="history-list">
                <div class="no-data">No test history yet</div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = localStorage.getItem('auraspeed-api-key') || '';

        function setStatus(type, message) {
            const status = document.getElementById('status');
            status.className = type;
            status.textContent = message;
        }

        function showResults(data) {
            document.getElementById('results').style.display = 'block';
            document.getElementById('sysinfo').style.display = 'none';
            document.getElementById('download').textContent = data.download.toFixed(2);
            document.getElementById('upload').textContent = data.upload.toFixed(2);
            document.getElementById('ping').textContent = data.ping;
            document.getElementById('isp').textContent = data.isp;
            document.getElementById('server').textContent = data.server;
            addToHistory(data);
        }

        function showSystemInfo(data) {
            document.getElementById('results').style.display = 'none';
            document.getElementById('sysinfo').style.display = 'block';
            document.getElementById('info-os').textContent = data.OS || '--';
            document.getElementById('info-cpu').textContent = data.CPU || '--';
            document.getElementById('info-memory').textContent = data.Memory || '--';
            document.getElementById('info-disk').textContent = data.Disk || '--';
            document.getElementById('info-hostname').textContent = data.Hostname || '--';
        }

        function runSpeedTest() {
            setStatus('loading', 'Running speed test...');
            const headers = { 'Content-Type': 'application/json' };
            if (API_KEY) headers['X-API-Key'] = API_KEY;

            fetch('/api/speedtest', { method: 'POST', headers })
                .then(r => {
                    if (!r.ok) throw new Error('Speed test failed');
                    return r.json();
                })
                .then(data => {
                    setStatus('success', 'Speed test completed!');
                    showResults(data);
                    setTimeout(() => setStatus('', ''), 3000);
                })
                .catch(e => {
                    setStatus('error', 'Error: ' + e.message);
                    setTimeout(() => setStatus('', ''), 5000);
                });
        }

        function getSystemInfo() {
            const headers = {};
            if (API_KEY) headers['X-API-Key'] = API_KEY;

            fetch('/api/info', { headers })
                .then(r => r.json())
                .then(data => showSystemInfo(data))
                .catch(e => alert('Error: ' + e));
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const btn = document.querySelector('.theme-toggle');
            btn.textContent = document.body.classList.contains('dark-theme') ? 'Light Mode' : 'Dark Mode';
        }

        // History functions
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('auraspeed-history') || '[]');
            const container = document.getElementById('history-list');

            if (history.length === 0) {
                container.innerHTML = '<div class="no-data">No test history yet</div>';
                return;
            }

            container.innerHTML = history.map(item => `
                <div class="history-item">
                    <span class="history-time">${item.time}</span>
                    <div class="history-stats">
                        <span class="history-stat">↓ ${item.download.toFixed(1)}</span>
                        <span class="history-stat">↑ ${item.upload.toFixed(1)}</span>
                        <span class="history-stat">⏱ ${item.ping}</span>
                    </div>
                </div>
            `).join('');
        }

        function addToHistory(data) {
            const history = JSON.parse(localStorage.getItem('auraspeed-history') || '[]');
            history.unshift({
                time: new Date().toLocaleString(),
                download: data.download,
                upload: data.upload,
                ping: data.ping
            });
            if (history.length > 10) history.pop();
            localStorage.setItem('auraspeed-history', JSON.stringify(history));
            loadHistory();
        }

        function clearHistory() {
            localStorage.removeItem('auraspeed-history');
            loadHistory();
        }

        // Initialize
        loadHistory();
    </script>
</body>
</html>
