version: '3.8'

services:
  auraspeed:
    build: .
    container_name: auraspeed
    ports:
      - "8080:8080"
    environment:
      - AURASPEED_LOGLEVEL=info
      - AURASPEED_AUTOUPDATE=false
    volumes:
      - auraspeed-config:/root/.auraspeed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  auraspeed-config:
    driver: local