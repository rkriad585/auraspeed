version: 2

project_name: auraspeed

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    ldflags:
      - -s -w
      - -X 'auraspeed/cmd/root.Version={{.Tag}}'
      - -X 'auraspeed/cmd/root.Commit={{.Commit}}'
      - -X 'auraspeed/cmd/root.BuildTime={{.Date}}'
    binary: auraspeed
    mod_timestamp: '{{.CommitTimestamp}}'

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_Linux_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else if eq .Arch "arm" }}armv7
      {{- else }}{{ .Arch }}{{ end }}
    extra_files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{.Tag}}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - 'Merge pull request'
